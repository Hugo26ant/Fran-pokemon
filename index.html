<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokemon-Francisco: Ultra Rogue</title>
    <style>
        :root { --bg: #0a0a0c; --panel: #16161a; --accent: #ffcb05; --hp-green: #4ade80; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        #game-container { width: 1100px; height: 600px; margin-top: 20px; display: grid; grid-template-columns: 1fr 380px; gap: 20px; background: var(--panel); padding: 25px; border-radius: 24px; border: 1px solid #2d2d35; position: relative; }
        
        #battle-arena { 
            position: relative; border-radius: 18px; overflow: hidden; 
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: space-around;
            transition: 0.8s ease; border: 2px solid #333;
        }

        .pkmn-sprite { width: 220px; height: 220px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); z-index: 2; }
        
        .status-box { background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 12px; width: 220px; border: 1px solid #444; backdrop-filter: blur(8px); text-align: center; }
        .hp-bar { height: 12px; background: #222; border-radius: 6px; margin: 10px 0; overflow: hidden; border: 1px solid #000; }
        .hp-fill { height: 100%; background: var(--hp-green); transition: width 0.5s ease-out; width: 100%; }

        #log { background: #000; height: 100%; overflow-y: auto; padding: 20px; font-size: 14px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column-reverse; color: #bbb; }
        
        .wave-tag { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 8px 20px; border-radius: 30px; font-weight: bold; z-index: 10; box-shadow: 0 4px 15px rgba(255,203,5,0.3); }

        #controls { width: 1100px; padding: 25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .btn { padding: 14px 28px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 0 #000; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-move { background: #3b82f6; color: white; }
        .btn-action { background: #10b981; color: white; }

        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.98); z-index:1000; display:none; flex-direction:column; align-items:center; justify-content:center; border-radius: 24px; }
        #money-txt { position: absolute; top: 15px; left: 25px; font-weight: bold; color: #fbbf24; font-size: 1.3em; }
    </style>
</head>
<body>

    <h1 style="margin-top:20px; letter-spacing: 4px;">POKEMON-<span style="color:var(--accent)">FRANCISCO</span></h1>

    <div id="game-container">
        <div id="wave-display" class="wave-tag">OLEADA: 1</div>
        <div id="money-txt">₽ 0</div>
        <div id="overlay"></div>
        
        <div id="battle-arena">
            <!-- JUGADOR -->
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="status-box">
                    <strong id="p-name">CARGANDO...</strong> <span id="p-lvl"></span>
                    <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div></div>
                    <div id="p-xp" style="font-size:11px; color:#aaa">XP: 0/100</div>
                </div>
                <img id="p-sprite" class="pkmn-sprite" src="">
            </div>

            <div style="font-size: 40px; font-weight: bold; color: rgba(255,255,255,0.1);">VS</div>

            <!-- RIVAL -->
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="status-box">
                    <strong id="e-name">BUSCANDO...</strong> <span id="e-lvl"></span>
                    <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div></div>
                </div>
                <img id="e-sprite" class="pkmn-sprite" src="">
            </div>
        </div>
        
        <div id="log"></div>
    </div>

    <div id="controls">
        <div id="actions" style="display:flex; gap:10px;"></div>
        <button class="btn btn-action" style="background:#8b5cf6" onclick="abrirTienda()">🏪 Tienda</button>
        <button class="btn" style="background:#ef4444; color:white" onclick="reiniciar()">🔄 Reiniciar</button>
    </div>

<script>
// --- CONFIGURACIÓN DE BIOMAS Y POKÉMON ---
const BIOMAS = [
    { n: 'PRADERA', bg: 'https://wallpaperaccess.com', pokes: [1, 10, 16, 19, 43, 69, 722], legs: [] },
    { n: 'BOSQUE', bg: 'https://img.itch.zone', pokes: [7, 13, 25, 46, 123, 152], legs: [251, 492] },
    { n: 'VOLCÁN', bg: 'https://i.redd.it', pokes: [4, 37, 58, 77, 126, 155], legs: [146, 244, 485] },
    { n: 'OCÉANO', bg: 'https://images7.alphacoders.com', pokes: [7, 54, 60, 72, 90, 656], legs: [144, 249, 382] }
];

let wave = 1;
let equipo = [];
let rival = null;
let dinero = 200;
let inventario = { balls: 10, potions: 5 };
let biomaIdx = 0;

class Pokemon {
    constructor(id, level, esEspecial = false) {
        this.id = id;
        this.level = level;
        this.xp = 0;
        this.maxHp = (esEspecial ? 120 : 50) + (level * 5);
        this.hp = this.maxHp;
        this.sprite = `https://raw.githubusercontent.com{id}.png`;
        this.name = "CARGANDO...";
        this.loadName();
    }

    async loadName() {
        try {
            const res = await fetch(`https://pokeapi.co{this.id}`);
            const data = await res.json();
            this.name = data.name.toUpperCase();
            updateUI();
        } catch(e) { this.name = "DESCONOCIDO"; }
    }
}

function init() {
    const save = localStorage.getItem('pkmn-francisco-rogue-v2');
    if (save) {
        const d = JSON.parse(save);
        equipo = d.equipo.map(p => Object.assign(new Pokemon(p.id, p.level), p));
        wave = d.wave || 1; dinero = d.dinero; inventario = d.inventario;
        biomaIdx = Math.floor((wave - 1) / 10) % BIOMAS.length;
        document.getElementById('overlay').style.display = 'none';
        cambiarBioma();
    } else { mostrarSeleccion(); }
    updateUI();
}

function mostrarSeleccion() {
    const ov = document.getElementById('overlay');
    ov.style.display = 'flex';
    ov.innerHTML = `<h2>Elige tu Starter</h2><div style="display:flex; gap:20px;">` +
        [722, 4, 656].map(id => `<div onclick="empezar(${id})" style="cursor:pointer; background:#222; padding:20px; border-radius:20px; border:1px solid #444;"><img src="https://raw.githubusercontent.com{id}.png" width="140"></div>`).join('') + `</div>`;
}

function empezar(id) {
    equipo = [new Pokemon(id, 5)];
    document.getElementById('overlay').style.display = 'none';
    addLog("¡Aventura iniciada! Buena suerte.");
    guardar(); buscarRival();
}

function cambiarBioma() {
    const b = BIOMAS[biomaIdx];
    document.getElementById('battle-arena').style.backgroundImage = `url(${b.img})`;
    addLog(`AVANZANDO... ENTRANDO EN EL BIOMA: ${b.n}`);
}

function buscarRival() {
    const b = BIOMAS[biomaIdx];
    let pool = [...b.pokes];
    let esEspecial = false;

    // Solo Legendarios si Oleada > 50 y suerte del 5%
    if (wave > 50 && Math.random() < 0.05 && b.legs.length > 0) {
        pool = b.legs;
        esEspecial = true;
    }

    const id = pool[Math.floor(Math.random() * pool.length)];
    const lvl = 5 + Math.floor(wave / 2.5); // Escala suave de nivel
    rival = new Pokemon(id, lvl, esEspecial);
    
    if(esEspecial) addLog(`¡¡ALERTA!! UN POKÉMON LEGENDARIO NIVEL ${lvl} APARECIÓ.`);
    else addLog(`Oleada ${wave}: Te enfrentas a un ${rival.name} salvaje.`);
    
    updateUI();
}

function atacar() {
    if(!rival) return;
    const p = equipo[0]; // Usamos el primero del equipo por simplicidad
    
    let dmg = 12 + (p.level * 2);
    rival.hp -= dmg;
    addLog(`${p.name} usó ATACAR e infligió ${dmg} de daño.`);

    if(rival.hp <= 0) {
        rival.hp = 0;
        addLog(`¡Has derrotado a ${rival.name}! +₽${wave * 12}`);
        dinero += wave * 12;
        p.xp += 40;
        verificarNivel(p);
        
        wave++;
        if(wave % 10 === 1) {
            biomaIdx = (biomaIdx + 1) % BIOMAS.length;
            cambiarBioma();
        }
        
        rival = null;
        setTimeout(buscarRival, 1200);
    } else {
        setTimeout(() => {
            let rdmg = 4 + Math.floor(rival.level/1.5);
            p.hp -= rdmg;
            addLog(`${rival.name} salvaje responde al ataque.`);
            if(p.hp <= 0) { p.hp = 0; addLog("¡Tu Pokémon se ha debilitado!"); }
            updateUI();
        }, 600);
    }
    updateUI();
    guardar();
}

function lanzarBall() {
    if(!rival || inventario.balls <= 0) return;
    inventario.balls--;
    addLog("Lanzando PokéBall...");
    let prob = (1 - (rival.hp / rival.maxHp)) + 0.1;
    if(Math.random() < prob) {
        addLog(`¡ÉXITO! Capturaste a ${rival.name}.`);
        if(equipo.length < 6) equipo.push(rival);
        rival = null; wave++; buscarRival();
    } else { addLog("¡El Pokémon se ha liberado!"); }
    updateUI();
}

function updateUI() {
    const p = equipo[0];
    if(!p) return;
    document.getElementById('money-txt').innerText = `₽ ${dinero}`;
    document.getElementById('wave-display').innerText = `OLEADA: ${wave}`;
    
    document.getElementById('p-name').innerText = p.name;
    document.getElementById('p-lvl').innerText = "Lv." + p.level;
    document.getElementById('p-hp-fill').style.width = (p.hp/p.maxHp*100) + "%";
    document.getElementById('p-sprite').src = p.sprite;
    document.getElementById('p-xp').innerText = `XP: ${p.xp}/100`;

    if(rival) {
        document.getElementById('e-name').innerText = rival.name;
        document.getElementById('e-lvl').innerText = "Lv." + rival.level;
        document.getElementById('e-hp-fill').style.width = (rival.hp/rival.maxHp*100) + "%";
        document.getElementById('e-sprite').src = rival.sprite;
        document.getElementById('e-sprite').style.opacity = 1;
    } else {
        document.getElementById('e-sprite').style.opacity = 0;
        document.getElementById('e-name').innerText = "BUSCANDO...";
    }

    const act = document.getElementById('actions');
    act.innerHTML = rival ? `<button class="btn btn-move" onclick="atacar()">Atacar</button>
                             <button class="btn" style="background:#f59e0b; color:white" onclick="lanzarBall()">📦 PokéBall (${inventario.balls})</button>` : "";
}

function addLog(msg) {
    const l = document.getElementById('log');
    l.innerHTML += `<div>> ${msg}</div>`;
}

function guardar() {
    localStorage.setItem('pkmn-francisco-rogue-v2', JSON.stringify({equipo, wave, dinero, inventario}));
}

function reiniciar() {
    if(confirm("¿Seguro que quieres reiniciar?")) {
        localStorage.removeItem('pkmn-francisco-rogue-v2');
        location.reload();
    }
}

function abrirTienda() {
    const ov = document.getElementById('overlay');
    ov.style.display = 'flex';
    ov.innerHTML = `<h2>Tienda Pokémon (₽${dinero})</h2>
        <button class="btn" onclick="comprar('balls', 50)">📦 PokéBall (₽50)</button><br><br>
        <button class="btn" onclick="comprar('potions', 80)">💊 Curar Equipo (₽80)</button><br><br>
        <button class="btn" style="background:#444; color:white" onclick="document.getElementById('overlay').style.display='none'">Cerrar</button>`;
}

function comprar(item, cost) {
    if(dinero >= cost) {
        dinero -= cost;
        if(item === 'potions') equipo.forEach(p => p.hp = p.maxHp);
        else inventario[item]++;
        abrirTienda(); updateUI(); guardar();
    }
}

function verificarNivel(p) {
    if(p.xp >= 100) {
        p.level++; p.xp = 0; p.maxHp += 10; p.hp = p.maxHp;
        addLog(`¡${p.name} subió al NIVEL ${p.level}!`);
    }
}

init();
</script>
</body>
</html>
