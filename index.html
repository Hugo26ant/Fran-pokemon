<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokemon-Francisco: Ultra Rogue</title>
    <style>
        :root { --bg: #0a0a0c; --panel: #16161a; --accent: #ffcb05; --hp-green: #4ade80; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #game-container { width: 1000px; height: 550px; margin-top: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; background: var(--panel); padding: 20px; border-radius: 20px; border: 1px solid #333; position: relative; }
        #battle-arena { position: relative; border-radius: 15px; overflow: hidden; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: space-around; min-height: 350px; border: 2px solid #222; }
        .pkmn-sprite { width: 180px; height: 180px; object-fit: contain; z-index: 2; }
        .status-box { background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px; width: 180px; border: 1px solid #444; text-align: center; }
        .hp-bar { height: 10px; background: #222; border-radius: 5px; margin: 8px 0; overflow: hidden; }
        .hp-fill { height: 100%; background: var(--hp-green); transition: width 0.5s; width: 100%; }
        #log { background: #000; height: 100%; overflow-y: auto; padding: 15px; font-size: 13px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column-reverse; color: #bbb; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; margin: 5px; }
        .btn-move { background: #3b82f6; color: white; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index:1000; display:none; flex-direction:column; align-items:center; justify-content:center; border-radius: 20px; }
        .wave-tag { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="margin-top:20px;">POKEMON-<span style="color:var(--accent)">FRANCISCO</span></h1>

    <div id="game-container">
        <div id="wave-display" class="wave-tag">OLEADA: 1</div>
        <div id="overlay"></div>
        <div id="battle-arena">
            <div>
                <div class="status-box">
                    <strong id="p-name">Cargando...</strong> <span id="p-lvl"></span>
                    <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div></div>
                </div>
                <img id="p-sprite" class="pkmn-sprite">
            </div>
            <div style="font-weight:bold; opacity:0.2; font-size:40px">VS</div>
            <div>
                <div class="status-box">
                    <strong id="e-name">Cargando...</strong> <span id="e-lvl"></span>
                    <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div></div>
                </div>
                <img id="e-sprite" class="pkmn-sprite">
            </div>
        </div>
        <div id="log"></div>
    </div>

    <div id="controls" style="margin-top:20px; text-align:center;">
        <div id="move-buttons"></div>
        <button class="btn" style="background:#f59e0b" onclick="lanzarBall()">PokéBall</button>
        <button class="btn" style="background:#ef4444; color:white" onclick="reiniciar()">Reiniciar</button>
    </div>

<script>
const POKEDEX_BASE = {
    4: { moves: ['Ascuas', 'Arañazo'] }, // Charmander
    722: { moves: ['Follaje', 'Placaje'] }, // Rowlet
    656: { moves: ['Burbuja', 'Destructor'] }, // Froakie
    16: { moves: ['Tornado'] }, // Pidgey
    150: { moves: ['Psíquico', 'Bola Sombra'] } // Mewtwo
};

let wave = 1;
let equipo = [];
let rival = null;

async function crearPokemon(id, lvl) {
    const res = await fetch(`https://pokeapi.co{id}`);
    const data = await res.json();
    return {
        id: id,
        name: data.name.toUpperCase(),
        level: lvl,
        hp: 50 + (lvl * 5),
        maxHp: 50 + (lvl * 5),
        sprite: data.sprites.other['official-artwork'].front_default,
        moves: POKEDEX_BASE[id] ? POKEDEX_BASE[id].moves : ['Placaje']
    };
}

async function init() {
    const save = localStorage.getItem('pkmn-francisco-v3');
    if (save) {
        const d = JSON.parse(save);
        equipo = d.equipo; wave = d.wave;
        addLog("Progreso cargado.");
        buscarRival();
    } else { mostrarSeleccion(); }
}

function mostrarSeleccion() {
    const ov = document.getElementById('overlay');
    ov.style.display = 'flex';
    ov.innerHTML = `<h2>Elige Starter</h2>` + [4, 722, 656].map(id => 
        `<button class="btn" onclick="empezar(${id})">ID: ${id}</button>`).join('');
}

async function empezar(id) {
    equipo = [await crearPokemon(id, 5)];
    document.getElementById('overlay').style.display = 'none';
    buscarRival();
}

async function buscarRival() {
    const pool = [16, 19, 10, 4, 722, 656];
    if (wave > 10) pool.push(150); // Mewtwo solo tras oleada 10
    const id = pool[Math.floor(Math.random() * pool.length)];
    rival = await crearPokemon(id, 5 + Math.floor(wave/2));
    updateUI();
    addLog(`¡Un ${rival.name} salvaje nivel ${rival.level} apareció!`);
}

function atacar(move) {
    if(!rival) return;
    let p = equipo[0];
    let dmg = 10 + p.level;
    rival.hp -= dmg;
    addLog(`${p.name} usó ${move} e hizo ${dmg} de daño.`);
    
    if(rival.hp <= 0) {
        addLog(`¡${rival.name} debilitado!`);
        wave++;
        rival = null;
        setTimeout(buscarRival, 1000);
    } else {
        setTimeout(() => {
            let rdmg = 5 + rival.level;
            p.hp -= rdmg;
            addLog(`${rival.name} respondió con un golpe.`);
            updateUI();
        }, 500);
    }
    updateUI();
    guardar();
}

function updateUI() {
    const p = equipo[0];
    if(!p) return;
    document.getElementById('p-name').innerText = p.name;
    document.getElementById('p-lvl').innerText = "Lv." + p.level;
    document.getElementById('p-sprite').src = p.sprite;
    document.getElementById('p-hp-fill').style.width = (p.hp/p.maxHp*100) + "%";

    if(rival) {
        document.getElementById('e-name').innerText = rival.name;
        document.getElementById('e-lvl').innerText = "Lv." + rival.level;
        document.getElementById('e-sprite').src = rival.sprite;
        document.getElementById('e-hp-fill').style.width = (rival.hp/rival.maxHp*100) + "%";
    }

    const btnContainer = document.getElementById('move-buttons');
    btnContainer.innerHTML = "";
    p.moves.forEach(m => {
        btnContainer.innerHTML += `<button class="btn btn-move" onclick="atacar('${m}')">${m}</button>`;
    });
}

function addLog(msg) { document.getElementById('log').innerHTML += `<div>> ${msg}</div>`; }
function guardar() { localStorage.setItem('pkmn-francisco-v3', JSON.stringify({equipo, wave})); }
function reiniciar() { localStorage.clear(); location.reload(); }

init();
</script>
</body>
</html>
